apiVersion: apps/v1
kind: Deployment
metadata:
  name: mapping-cloud
  namespace: argo
  labels:
    app.kubernetes.io/name: mapping-cloud
    app.kubernetes.io/part-of: mapping-cloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mapping-cloud
  template:
    metadata:
      labels:
        app: mapping-cloud
        app.kubernetes.io/name: mapping-cloud
        app.kubernetes.io/part-of: mapping-cloud
    spec:
      nodeSelector:
        vehicle.role: general
      volumes:
        - name: mapping-maps
          emptyDir: {}
      containers:
        - name: mapping-cloud
          image: vehicle-cloud:amd64
          imagePullPolicy: IfNotPresent
          ports:
            - name: ingest
              containerPort: 15000
            - name: viewer
              containerPort: 18080
          envFrom:
            - configMapRef:
                name: mapping-cloud-config
          volumeMounts:
            - name: mapping-maps
              mountPath: /tmp/mapping_maps
          readinessProbe:
            httpGet:
              path: /api/cloud
              port: viewer
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/cloud
              port: viewer
            initialDelaySeconds: 60
            periodSeconds: 20
