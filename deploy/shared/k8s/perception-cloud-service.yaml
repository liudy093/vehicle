apiVersion: v1
kind: Service
metadata:
  name: perception-cloud
  namespace: perception
  labels:
    app.kubernetes.io/name: perception-cloud
    app.kubernetes.io/part-of: perception-cloud
spec:
  type: NodePort
  selector:
    app: perception-cloud
    app.kubernetes.io/name: perception-cloud
  ports:
    - name: ingest
      port: 15000
      targetPort: 15000
      nodePort: 30404
    - name: viewer
      port: 18080
      targetPort: 18080
      nodePort: 31278
