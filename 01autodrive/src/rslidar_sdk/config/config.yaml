common:
  msg_source: 1                                         #0: not use Lidar
                                                        #1: packet message comes from online Lidar
                                                        #2: packet message comes from ROS or ROS2
                                                        #3: packet message comes from Pcap file
                                                        #4: packet message comes from Protobuf-UDP
                                                        #5: point cloud comes from Protobuf-UDP
  send_packet_ros: true                                #true: Send packets through ROS or ROS2(Used to record packet)
  send_point_cloud_ros: true                            #true: Send point cloud through ROS or ROS2
  send_packet_proto: false                              #true: Send packets through Protobuf-UDP
  send_point_cloud_proto: false                         #true: Send point cloud through Protobuf-UDP
  pcap_path: /home/robosense/lidar.pcap                 #The path of pcap file
lidar:
  - driver:
      lidar_type: RSM1            #LiDAR type - RS16, RS32, RSBP, RSBPV4, RSHELIOS, RSHELIOS_16P, RS128, RS80, RS48, RSP128, RSP80, RSP48, 
                                   #             RSM1, RSM1_JUMBO, RSM2, RSE1
      frame_id: /rslidar           #Frame id of message
      msop_port: 6699              #Msop port of lidar
      difop_port: 7788             #Difop port of lidar
      start_angle: 0               #Start angle of point cloud
      end_angle: 360               #End angle of point cloud 
      min_distance: 0.2            #Minimum distance of point cloud
      max_distance: 50            #Maximum distance of point cloud
      wait_for_difop: true         #Wait for DIFOP packet
      use_lidar_clock: false       #True--Use the lidar clock as the message timestamp
                                   #False-- Use the system clock as the timestamp
    x: 0
    y: 0
    z: 0
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

    ros:
      ros_recv_packet_topic: /forward/rslidar_packets          #Topic used to receive lidar packets from ROS
      ros_send_packet_topic: /forward/rslidar_packets          #Topic used to send lidar packets through ROS
      ros_send_point_cloud_topic: /forward/rslidar_points      #Topic used to send point cloud through ROS
    proto:
      point_cloud_recv_port: 60021                     #Port number used for receiving point cloud 
      point_cloud_send_port: 60021                     #Port number which the point cloud will be send to
      msop_recv_port: 60022                            #Port number used for receiving lidar msop packets
      msop_send_port: 60022                            #Port number which the msop packets will be send to 
      difop_recv_port: 60023                           #Port number used for receiving lidar difop packets
      difop_send_port: 60023                           #Port number which the difop packets will be send to 
      point_cloud_send_ip: 127.0.0.1                   #Ip address which the point cloud will be send to 
      packet_send_ip: 127.0.0.1                        #Ip address which the lidar packets will be send to
    

  - driver:
      lidar_type: RSHELIOS_16P           
      frame_id: /rslidar           
      msop_port: 1111             
      difop_port: 2222            
      start_angle: 0              
      end_angle: 360               
      min_distance: 0.5            
      max_distance: 10            
      use_lidar_clock: false 
    ros:
      ros_recv_packet_topic: /right/rslidar_packets    
      ros_send_packet_topic: /right/rslidar_packets    
      ros_send_point_cloud_topic: /right/rslidar_points      
    proto:
      point_cloud_recv_port: 70021                     
      point_cloud_send_port: 70021                     
      msop_recv_port: 70022                       
      msop_send_port: 70022                       
      difop_recv_port: 70023                      
      difop_send_port: 70023       
      point_cloud_send_ip: 127.0.0.1                   
      packet_send_ip: 127.0.0.1    
    

  - driver:
      lidar_type: RSHELIOS_16P           
      frame_id: /rslidar           
      msop_port: 3333             
      difop_port: 4444            
      start_angle: 0              
      end_angle: 360               
      min_distance: 0.5            
      max_distance: 10            
      use_lidar_clock: false   
    x: -4
    y: -20
    z: 0
    roll: 0.0
    pitch: 0.0
    yaw: 0.0     
    ros:
      ros_recv_packet_topic: /left/rslidar_packets    
      ros_send_packet_topic: /left/rslidar_packets    
      ros_send_point_cloud_topic: /left/rslidar_points      
    proto:
      point_cloud_recv_port: 80021                     
      point_cloud_send_port: 80021                     
      msop_recv_port: 80022                       
      msop_send_port: 80022                       
      difop_recv_port: 80023                      
      difop_send_port: 80023       
      point_cloud_send_ip: 127.0.0.1                   
      packet_send_ip: 127.0.0.1   
    



